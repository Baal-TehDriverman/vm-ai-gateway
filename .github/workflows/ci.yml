name: CI - VM AI Gateway & Dashboards

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvirt-dev pkg-config gcc python3-dev

      - name: Install Lilith Gateway dependencies
        run: |
          cd lilith-gateway
          python -m pip install --upgrade pip
          pip install -q fastapi uvicorn httpx pydantic psutil python-dotenv
          # Install test dependencies
          pip install -q pytest pytest-asyncio pytest-cov httpx

      - name: Install Windows Port Console dependencies
        run: |
          cd windows-port-console
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt
          pip install -q pytest pytest-asyncio pytest-cov httpx

      - name: Lint Lilith Gateway (ruff)
        run: |
          pip install -q ruff
          cd lilith-gateway
          ruff check . --select=E,F,W,I,N,UP,B,C4,PL,RUF,T20,PTH --ignore=E501

      - name: Lint Windows Port Console (ruff)
        run: |
          pip install -q ruff
          cd windows-port-console
          ruff check . --select=E,F,W,I,N,UP,B,C4,PL,RUF,T20,PTH --ignore=E501

      - name: Type check Lilith Gateway (mypy)
        run: |
          pip install -q mypy
          cd lilith-gateway
          mypy --ignore-missing-imports --no-error-summary gateway_server.py scan_apps.py scan_vms.py llm_providers.py || true

      - name: Type check Windows Port Console (mypy)
        run: |
          pip install -q mypy
          cd windows-port-console
          mypy --ignore-missing-imports --no-error-summary server.py vm_manager.py winrm_client.py || true

      - name: Run Lilith Gateway tests
        run: |
          cd lilith-gateway
          python -m pytest test_*.py -v --tb=short -x || true

      - name: Run Windows Port Console tests
        run: |
          cd windows-port-console
          python -m pytest test_*.py -v --tb=short -x || true

      - name: Verify imports work (smoke test)
        run: |
          cd lilith-gateway
          python -c "
          import gateway_server
          import scan_apps
          import scan_vms
          import llm_providers
          print('✓ Lilith Gateway imports OK')
          "
          cd ../windows-port-console
          python -c "
          import server
          import vm_manager
          import winrm_client
          print('✓ Windows Port Console imports OK')
          "

      - name: Check for syntax errors
        run: |
          python -m py_compile lilith-gateway/gateway_server.py
          python -m py_compile lilith-gateway/scan_apps.py
          python -m py_compile lilith-gateway/scan_vms.py
          python -m py_compile lilith-gateway/llm_providers.py
          python -m py_compile windows-port-console/server.py
          python -m py_compile windows-port-console/vm_manager.py
          python -m py_compile windows-port-console/winrm_client.py
          echo "✓ All Python files compile cleanly"

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Lilith Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./lilith-gateway
          push: false
          tags: lilith-gateway:latest
          load: true

      - name: Build Windows Port Console image
        uses: docker/build-push-action@v5
        with:
          context: ./windows-port-console
          push: false
          tags: windows-port-console:latest
          load: true

      - name: Test Docker images start
        run: |
          docker run -d --name gateway-test -p 8080:8080 lilith-gateway:latest
          sleep 5
          curl -sf http://localhost:8080/api/status || (docker logs gateway-test && exit 1)
          docker stop gateway-test
          docker rm gateway-test

          docker run -d --name console-test -p 8081:8081 windows-port-console:latest
          sleep 5
          curl -sf http://localhost:8081/api/vm/status || (docker logs console-test && exit 1)
          docker stop console-test
          docker rm console-test

  release:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true